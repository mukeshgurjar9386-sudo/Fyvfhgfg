name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          
      - run: npm install
      
      - run: npx expo install
      
      - run: npx eas build --platform android --profile preview --non-interactive --local --output ./EditAI.apk
        
      - uses: actions/upload-artifact@v4
        with:
          name: EditAI-APK
          path: ./EditAI.apk
